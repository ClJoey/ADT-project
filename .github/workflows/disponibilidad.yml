name: Disponibilidad Fiscalización DT

on:
  workflow_dispatch:

jobs:
  disponibilidad:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Instalar dependencias del sistema (wkhtmltopdf)
      run: |
        sudo apt-get update
        sudo apt-get install -y wkhtmltopdf

    - name: Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Instalar Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Ejecutar test de disponibilidad
      env:
        CI: "true"
        TZ: "America/Santiago"
        PORTAL_USER: ${{ secrets.PORTAL_USER }}
        PORTAL_PASS: ${{ secrets.PORTAL_PASS }}
      run: pytest tests/test_disponibilidad.py -s

    - name: Generar informe PDF
      if: always()
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: python utils/report_disponibilidad.py

    - name: Enviar correo si hay fallos
      if: always()
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        PYTHONPATH: ${{ github.workspace }}
      run: python utils/enviar_correo_disponibilidad.py

    - name: Subir evidencias
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: disponibilidad-evidencias
        path: |
          reports/
          screenshots/
