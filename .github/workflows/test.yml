name: Selenium Tests

on:
  push:
    branches: [ "ci-cd-tests" ]
  pull_request:
    branches: [ "ci-cd-tests" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip' # Esto hace que las siguientes veces instale más rápido

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Instalar Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Ejecutar tests
      # Agregamos env: CI: true para que tu conftest.py lo detecte correctamente
      env:
        CI: "true"
      run: pytest tests/test_reporte.py -s

    - name: Subir reportes
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: reportes-ejecucion
        path: |
          reports/
          screenshots/
          downloads/